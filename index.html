<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet">
    <script>
      window.googleTranslateElementInit = function() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          includedLanguages: 'en,ar',
          layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
          autoDisplay: false
        }, 'google_translate_element');
      };

      function triggerTranslate(langCode) {
        const select = document.querySelector('.goog-te-combo');
        if (select) {
          select.value = langCode;
          select.dispatchEvent(new Event('change'));
          
          // Update Direction
          if (langCode === 'ar') {
            document.documentElement.setAttribute('dir', 'rtl');
            document.documentElement.lang = 'ar';
            document.body.classList.add('font-arabic');
          } else {
            document.documentElement.setAttribute('dir', 'ltr');
            document.documentElement.lang = 'en';
            document.body.classList.remove('font-arabic');
          }
          localStorage.setItem('preferredLanguage', langCode);
        }
      }

      // Check for saved language on load
      window.addEventListener('load', () => {
        const savedLang = localStorage.getItem('preferredLanguage');
        if (savedLang && savedLang !== 'en') {
          setTimeout(() => triggerTranslate(savedLang), 1000);
        }
      });
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <style>
      .goog-te-banner-frame.skiptranslate, 
      .goog-te-gadget-icon,
      #goog-gt-tt,
      .goog-tooltip,
      .goog-tooltip:hover {
        display: none !important;
      }
      body {
        top: 0 !important;
      }
      .goog-text-highlight {
        background-color: transparent !important;
        box-shadow: none !important;
      }
      #google_translate_element {
        display: none !important;
      }
      .font-arabic {
        font-family: 'Almarai', sans-serif !important;
      }
      /* RTL overrides */
      [dir="rtl"] .ml-auto { margin-right: auto !important; margin-left: 0 !important; }
      [dir="rtl"] .mr-auto { margin-left: auto !important; margin-right: 0 !important; }
      [dir="rtl"] .text-left { text-align: right !important; }
      [dir="rtl"] .text-right { text-align: left !important; }
      [dir="rtl"] .flex-row-reverse { flex-direction: row !important; }
      [dir="rtl"] .lg\:text-left { text-align: right !important; }
      [dir="rtl"] .md\:text-left { text-align: right !important; }
      [dir="rtl"] .tracking-widest { tracking: normal !important; }
      [dir="rtl"] .tracking-tighter { tracking: normal !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
